# =============================================================
# azure-pipelines.yml
# Pipeline di release modulare per deploy soluzione Fabric
# Supporta connettori: BC, CRM, o entrambi
# =============================================================
trigger: none

parameters:
  - name: targetEnvironment
    displayName: "Workspace target"
    type: string
    default: dev
    values:
      - dev
      - prod

  - name: connectors
    displayName: "Connettori da installare (separati da virgola)"
    type: string
    default: "BC"
    values:
      - "BC"
      - "CRM"
      - "BC,CRM"

variables:
  - group: fabric-deploy-${{ parameters.targetEnvironment }}

stages:
  - stage: DeployFabric
    displayName: "Deploy Fabric - ${{ parameters.targetEnvironment }} [${{ parameters.connectors }}]"
    jobs:
      - job: Deploy
        displayName: "Deploy items (${{ parameters.connectors }})"
        pool:
          vmImage: "windows-latest"

        steps:
          - checkout: self

          # -- Verifica variabili obbligatorie --
          - task: PowerShell@2
            displayName: "Verifica variabili"
            inputs:
              targetType: inline
              script: |
                $connectors = "${{ parameters.connectors }}".Split(",") | ForEach-Object { $_.Trim().ToUpper() }
                Write-Host "[CONFIG] Connettori: $($connectors -join ', ')"

                # Variabili sempre obbligatorie (Fabric)
                $required = @(
                  "FABRIC_TENANT_ID","FABRIC_CLIENT_ID","FABRIC_CLIENT_SECRET","FABRIC_WORKSPACE_ID"
                )

                # Variabili obbligatorie per BC
                if ($connectors -contains "BC") {
                  $required += @("BC_TENANT_ID","BC_ENVIRONMENT","BC_COMPANIES","BC_ENTITIES")
                }

                # Variabili obbligatorie per CRM
                if ($connectors -contains "CRM") {
                  $required += @("CRM_ORG_URL","CRM_ENTITIES")
                }

                $ok = $true
                foreach ($v in $required) {
                  $val = [System.Environment]::GetEnvironmentVariable($v)
                  if ([string]::IsNullOrEmpty($val)) {
                    Write-Host "##vso[task.logissue type=error]Variabile mancante: $v"
                    $ok = $false
                  } else {
                    if ($v -like "*SECRET*") {
                      Write-Host "[OK] $v = ********"
                    } else {
                      Write-Host "[OK] $v = $val"
                    }
                  }
                }
                if (-not $ok) { exit 1 }
            env:
              FABRIC_TENANT_ID:     $(FABRIC_TENANT_ID)
              FABRIC_CLIENT_ID:     $(FABRIC_CLIENT_ID)
              FABRIC_CLIENT_SECRET: $(FABRIC_CLIENT_SECRET)
              FABRIC_WORKSPACE_ID:  $(FABRIC_WORKSPACE_ID)
              BC_TENANT_ID:         $(BC_TENANT_ID)
              BC_ENVIRONMENT:       $(BC_ENVIRONMENT)
              BC_COMPANIES:         $(BC_COMPANIES)
              BC_ENTITIES:          $(BC_ENTITIES)
              CRM_ORG_URL:          $(CRM_ORG_URL)
              CRM_ENTITIES:         $(CRM_ENTITIES)
              CRM_TENANT_ID:        $(CRM_TENANT_ID)
              CRM_CLIENT_ID:        $(CRM_CLIENT_ID)
              CRM_CLIENT_SECRET:    $(CRM_CLIENT_SECRET)

          # -- Deploy tutti gli item Fabric --
          - task: PowerShell@2
            displayName: "Deploy Fabric items"
            inputs:
              filePath: "scripts/deploy.ps1"
              arguments: >
                -TenantId       "$(FABRIC_TENANT_ID)"
                -ClientId       "$(FABRIC_CLIENT_ID)"
                -ClientSecret   "$(FABRIC_CLIENT_SECRET)"
                -WorkspaceId    "$(FABRIC_WORKSPACE_ID)"
                -Connectors     "${{ parameters.connectors }}"
                -BcTenantId     "$(BC_TENANT_ID)"
                -BcEnvironment  "$(BC_ENVIRONMENT)"
                -BcCompanies    "$env:BC_COMPANIES"
                -BcEntities     "$env:BC_ENTITIES"
                -BcPythonFile   "bc_sync.py"
                -CrmTenantId    "$env:CRM_TENANT_ID"
                -CrmClientId    "$env:CRM_CLIENT_ID"
                -CrmClientSecret "$env:CRM_CLIENT_SECRET"
                -CrmOrgUrl      "$env:CRM_ORG_URL"
                -CrmEntities    "$env:CRM_ENTITIES"
                -CrmPythonFile  "crm_sync.py"
            env:
              BC_COMPANIES:     $(BC_COMPANIES)
              BC_ENTITIES:      $(BC_ENTITIES)
              CRM_ORG_URL:      $(CRM_ORG_URL)
              CRM_ENTITIES:     $(CRM_ENTITIES)
              CRM_TENANT_ID:    $(CRM_TENANT_ID)
              CRM_CLIENT_ID:    $(CRM_CLIENT_ID)
              CRM_CLIENT_SECRET: $(CRM_CLIENT_SECRET)